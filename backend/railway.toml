# Railway monorepo note: the config file may not follow Root Directory.
# If this file is ignored, set **Config file path** to `/backend/railway.toml` in Railway.
# Set service **Root Directory** to `backend`.
#
# https://docs.railway.com/guides/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
